<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyd PEM </title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e8e4d9;
      font-family: Arial, sans-serif;
      color: #111;
      padding: 24px;
    }

    .page {
      width: 1100px;
      max-width: 95vw;
      background: #f7f3eb;
      border: 2px solid #161616;
      padding: 24px 24px 14px;
      animation: pageIn .7s ease;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: #111;
    }

    .diagram {
      position: relative;
      height: 460px;
      background: #fffdfa;
      border: 2px solid #161616;
      overflow: hidden;
    }

    .label {
      position: absolute;
      z-index: 5;
      font-size: 18px;
      font-weight: 700;
      color: #111;
      line-height: 1.15;
    }

    .label small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 4px;
      color: #333;
    }

    .label-h2 {
      left: 34px;
      top: 175px;
    }

    .label-o2 {
      right: 34px;
      top: 175px;
      text-align: right;
    }

    .label-electricity {
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      text-align: center;
    }

    .label-output {
      right: 34px;
      bottom: 50px;
      text-align: right;
    }

    .cell {
      position: absolute;
      left: 50%;
      top: 53%;
      transform: translate(-50%, -50%);
      width: 660px;
      height: 220px;
      display: flex;
      border: 2px solid #161616;
      background: #fff;
      z-index: 2;
    }

    .zone {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px 10px;
      border-right: 2px solid #161616;
      position: relative;
      color: #111;
    }

    .zone strong {
      display: block;
      font-size: 21px;
      letter-spacing: 0.02em;
    }

    .zone span {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 400;
    }

    .anode {
      width: 30%;
      background: #dbeafe;
    }

    .membrane {
      width: 18%;
      background: #dcfce7;
    }

    .cathode {
      width: 30%;
      background: #fee2e2;
    }

    .output {
      width: 22%;
      background: #fef3c7;
      border-right: none;
    }

    .pipe {
      position: absolute;
      height: 3px;
      background: #161616;
      z-index: 1;
    }

    .pipe.h2 {
      left: 145px;
      top: 225px;
      width: 170px;
    }

    .pipe.o2 {
      right: 145px;
      top: 225px;
      width: 170px;
    }

    .pipe.water {
      right: 145px;
      bottom: 112px;
      width: 170px;
    }

    .circuit {
      position: absolute;
      left: 314px;
      top: 88px;
      width: 500px;
      height: 78px;
      border-top: 3px solid #161616;
      border-left: 3px solid #161616;
      border-right: 3px solid #161616;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      z-index: 4;
    }

    .h2-dot {
      left: 145px;
      top: 220px;
      background: #2563eb;
      animation: moveH2 3s linear infinite;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .h2-dot.d2 { animation-delay: 1s; }
    .h2-dot.d3 { animation-delay: 2s; }

    @keyframes moveH2 {
      0%   { transform: translateX(0); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateX(165px); opacity: 0; }
    }

    .o2-dot {
      right: 145px;
      top: 220px;
      background: #dc2626;
      animation: moveO2 3.3s linear infinite;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }

    .o2-dot.o2b { animation-delay: 1.1s; }
    .o2-dot.o2c { animation-delay: 2.2s; }

    @keyframes moveO2 {
      0%   { transform: translateX(0); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateX(-165px); opacity: 0; }
    }

    .water-dot {
      right: 145px;
      bottom: 106px;
      background: #16a34a;
      animation: moveWater 2.8s linear infinite;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
    }

    .water-dot.w2 { animation-delay: .9s; }
    .water-dot.w3 { animation-delay: 1.8s; }

    @keyframes moveWater {
      0%   { transform: translateX(0); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateX(165px); opacity: 0; }
    }

    .electron {
      left: 0;
      top: 0;
      width: 10px;
      height: 10px;
      background: #111827;
      animation: electronMove 3s linear infinite;
      box-shadow: 0 0 0 3px rgba(17,24,39,0.10);
    }

    .electron.e2 { animation-delay: 1s; }
    .electron.e3 { animation-delay: 2s; }

    @keyframes electronMove {
      0% {
        transform: translate(0, 78px);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      35% {
        transform: translate(120px, 0);
        opacity: 1;
      }
      75% {
        transform: translate(380px, 0);
        opacity: 1;
      }
      100% {
        transform: translate(500px, 78px);
        opacity: 0;
      }
    }

    .proton-lane {
      position: absolute;
      left: 458px;
      top: 173px;
      width: 110px;
      height: 70px;
      z-index: 4;
      overflow: hidden;
    }

    .proton {
      left: 0;
      top: 29px;
      width: 10px;
      height: 10px;
      background: #15803d;
      animation: protonMove 2.4s linear infinite;
      box-shadow: 0 0 0 3px rgba(21,128,61,0.10);
    }

    .proton.p2 { animation-delay: .8s; }
    .proton.p3 { animation-delay: 1.6s; }

    @keyframes protonMove {
      0%   { transform: translateX(0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateX(100px); opacity: 0; }
    }

    .reaction {
      position: absolute;
      right: 265px;
      top: 188px;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(22,163,74,0.45);
      border-radius: 50%;
      animation: pulse 2.2s ease-out infinite;
      z-index: 3;
    }

    .reaction.r2 {
      animation-delay: 1.1s;
    }

    @keyframes pulse {
      from {
        transform: scale(.7);
        opacity: .8;
      }
      to {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .legend {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 14px;
      color: #111;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #111;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title">How a Hydrogen Fuel Cell Works</div>

    <div class="diagram">
      <div class="label label-h2">
        H₂ input
        <small>Hydrogen enters</small>
      </div>

      <div class="label label-o2">
        O₂ input
        <small>Oxygen enters</small>
      </div>

      <div class="label label-electricity">
        Electricity
        <small>External circuit</small>
      </div>

      <div class="label label-output">
        H₂O output
        <small>Water + heat</small>
      </div>

      <div class="pipe h2"></div>
      <div class="pipe o2"></div>
      <div class="pipe water"></div>

      <div class="particle h2-dot"></div>
      <div class="particle h2-dot d2"></div>
      <div class="particle h2-dot d3"></div>

      <div class="particle o2-dot"></div>
      <div class="particle o2-dot o2b"></div>
      <div class="particle o2-dot o2c"></div>

      <div class="particle water-dot"></div>
      <div class="particle water-dot w2"></div>
      <div class="particle water-dot w3"></div>

      <div class="circuit">
        <div class="particle electron"></div>
        <div class="particle electron e2"></div>
        <div class="particle electron e3"></div>
      </div>

      <div class="proton-lane">
        <div class="particle proton"></div>
        <div class="particle proton p2"></div>
        <div class="particle proton p3"></div>
      </div>

      <div class="reaction"></div>
      <div class="reaction r2"></div>

      <div class="cell">
        <div class="zone anode">
          <div>
            <strong>ANODE</strong>
            <span>Hydrogen in<br>H₂ → H⁺ + e⁻</span>
          </div>
        </div>

        <div class="zone membrane">
          <div>
            <strong>PEM</strong>
            <span>Protons cross<br>Electrons blocked</span>
          </div>
        </div>

        <div class="zone cathode">
          <div>
            <strong>CATHODE</strong>
            <span>Oxygen in<br>H⁺ + e⁻ + O₂</span>
          </div>
        </div>

        <div class="zone output">
          <div>
            <strong>OUTPUT</strong>
            <span>Water<br>+ heat</span>
          </div>
        </div>
      </div>
    </div>

    <div class="legend">
      <span><i style="background:#2563eb;"></i> Hydrogen</span>
      <span><i style="background:#15803d;"></i> Protons</span>
      <span><i style="background:#111827;"></i> Electrons</span>
      <span><i style="background:#dc2626;"></i> Oxygen</span>
      <span><i style="background:#16a34a;"></i> Water</span>
    </div>

    <div class="footer">@drt-hbr</div>
  </div>
</body>
</html>
